<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yabujin Player</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            color: white; font-family: 'Courier New', monospace; overflow: hidden;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.4)), 
                        url("https://i.ibb.co/2797k0wv/a267bd3c72feb2300aecb36085195edf.jpg") center/cover no-repeat fixed;
        }
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 10;
        }
        .card {
            background: rgba(5, 5, 5, 0.6); padding: 30px; width: 85%; max-width: 400px;
            text-align: center; position: relative; z-index: 20; backdrop-filter: blur(5px);
            border-left: 5px solid #ff0000; border-right: 5px solid #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); animation: neon-pulse 4s infinite;
        }
        @keyframes neon-pulse { 0%, 100% { box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); } 50% { box-shadow: 0 0 50px rgba(255, 0, 0, 0.7); } }
        .glitch { font-size: 22px; font-weight: 900; color: white; text-transform: uppercase; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 2; padding: 12px; border: none; background: #800000; color: white; font-weight: bold; cursor: pointer; }
        .clear-btn { flex: 1; background: #333; font-size: 10px; }
        #player-box { min-height: 166px; background: rgba(255,255,255,0.05); margin-bottom: 20px; border: 1px solid #333; }
        .playlist { text-align: left; max-height: 120px; overflow-y: auto; border-top: 1px solid #ff0000; padding-top: 10px; }
        .t-item { background: rgba(255,0,0,0.1); padding: 8px; margin-bottom: 5px; font-size: 10px; display: flex; justify-content: space-between; border-left: 2px solid #ff0000; }
        .del { color: #ff0000; font-weight: bold; cursor: pointer; padding: 0 5px; }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="card">
        <div class="glitch">DROP ME BRO:</div>
        <input type="text" id="sc-link" placeholder="ВСТАВЬ ССЫЛКУ...">
        <div class="btn-row">
            <button onclick="addAndPlay()">ADD & PLAY</button>
            <button onclick="clearList()" class="clear-btn">CLEAR</button>
        </div>
        <div id="player-box"></div>
        <div class="playlist" id="list"></div>
    </div>

    <script>
        let tracks = JSON.parse(localStorage.getItem('yab-tracks')) || [];
        showList();

        function addAndPlay() {
            const val = document.getElementById('sc-link').value;
            if (val.includes('soundcloud.com')) {
                tracks.push(val);
                localStorage.setItem('yab-tracks', JSON.stringify(tracks));
                runPlayer(val);
                showList();
                document.getElementById('sc-link').value = "";
            } else { alert("БРО, НУЖНА ССЫЛКА НА SOUNDCLOUD!"); }
        }

        function runPlayer(link) {
            const box = document.getElementById('player-box');
            box.innerHTML = `<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" 
            src="https://soundcloud.com{encodeURIComponent(link)}&color=%23ff0000&auto_play=true"></iframe>`;
        }

        function showList() {
            const l = document.getElementById('list');
            l.innerHTML = "";
            tracks.forEach((t, i) => {
                const d = document.createElement('div');
                d.className = 't-item';
                d.innerHTML = `<span onclick="runPlayer('${t}')" style="cursor:pointer">#${i+1} TRACK</span>
                               <span class="del" onclick="removeT(${i})">X</span>`;
                l.appendChild(d);
            });
        }

        function removeT(i) {
            tracks.splice(i, 1);
            localStorage.setItem('yab-tracks', JSON.stringify(tracks));
            showList();
        }

        function clearList() {
            if(confirm("ЧИСТИМ?")) {
                tracks = [];
                localStorage.removeItem('yab-tracks');
                document.getElementById('player-box').innerHTML = "";
                showList();
            }
        }
    </script>
</body>
</html>
